<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Informasi Cryptocurrency</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>₿ Informasi Cryptocurrency</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Masukkan nama crypto (contoh: bitcoin, ethereum)">
            <button onclick="searchCrypto()">Cari</button>
        </div>
        <div id="loading" class="loading" style="display: none;">⏳ Memuat data...</div>
        <div id="result"></div>
        <div id="error" class="error" style="display: none;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
